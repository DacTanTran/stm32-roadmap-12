const START=new Date(2025,5,16);
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function fmt(d){return d.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'})}
function wr(idx){const s=addD(START,idx*7);return fmt(s)+'–'+fmt(addD(s,6))}
function wGlobalIdx(mi,wi){let n=0;for(let i=0;i<mi;i++)n+=D[i].weeks.length;return n+wi}

const qL={1:'Q1 — Tháng 1–3: Nền tảng STM32 HAL',2:'Q2 — Tháng 4–6: Protocol & System',3:'Q3 — Tháng 7–9: Deep dive & Algorithm',4:'Q4 — Tháng 10–12: RF, Safety & Capstone'};
let mo=null,wo={},wd=new Set(),wck={},view=0;
try{const s=localStorage.getItem('s48');if(s){const p=JSON.parse(s);wd=new Set(p.d||[]);wck=p.c||{}}}catch(e){}
function sv(){try{localStorage.setItem('s48',JSON.stringify({d:[...wd],c:wck}))}catch(e){}}

function setQ(v){view=v;document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',i===v));render()}

function render(){
  const list=document.getElementById('list');list.innerHTML='';
  const items=view===0?D:D.filter(m=>m.q===view);
  let lastQ=0;
  items.forEach(m=>{
    const mi=D.indexOf(m);
    if(view===0&&m.q!==lastQ){lastQ=m.q;const e=document.createElement('div');e.className='qlbl';e.textContent=qL[m.q];list.appendChild(e)}
    const totalWk=m.weeks.length;
    const doneWk=m.weeks.filter((_,wi)=>wd.has(wGlobalIdx(mi,wi))).length;
    const anyDone=doneWk>0;const allDone=doneWk===totalWk;
    const isOpen=mo===mi;
    const mc=document.createElement('div');
    mc.className='mc'+(allDone?' done':anyDone?' prog':'');
    mc.onclick=()=>{mo=isOpen?null:mi;render()};

    // Build weeks HTML
    let wHtml='';
    m.weeks.forEach((w,wi)=>{
      const gIdx=wGlobalIdx(mi,wi);
      const key='w'+gIdx;
      if(!wck[key])wck[key]=new Array(w.ck.length).fill(false);
      const cnt=wck[key].filter(Boolean).length;
      const pct=Math.round(cnt/w.ck.length*100);
      const isDone=wd.has(gIdx),isHalf=!isDone&&cnt>0,isWOpen=wo[mi]===wi;
      wHtml+=`<div class="wc ${isDone?'wdone':isHalf?'wprog':''}" onclick="event.stopPropagation();tW(${mi},${wi})">
        <div class="wh">
          <div class="wno">Tuần ${wi+1}<br><span style="font-size:9px;color:#c4c4c0">${wr(gIdx)}</span></div>
          <div class="wt">${w.t}</div>
          <span class="wcv ${isWOpen?'o':''}">▾</span>
        </div>
        ${cnt>0&&!isDone?`<div class="wbar"><div class="wbfil" style="width:${pct}%"></div></div>`:''}
        <div class="wdet ${isWOpen?'o':''}">
          <div class="dg">
            <div class="db"><div class="dl">Target</div><div class="dv">${w.target}</div></div>
            <div class="db"><div class="dl">Aim</div><div class="dv">${w.aim}</div></div>
          </div>
          <div class="sb">
            <div class="dl" style="margin-bottom:5px">Lịch trong tuần</div>
            ${w.sched.map(s=>`<div class="sr"><div class="sd">${s[0]}</div><div class="sa">${s[1]}</div></div>`).join('')}
          </div>
          <div class="cl">
            <div class="dl" style="margin-bottom:4px">Checklist</div>
            ${w.ck.map((c,ci)=>`<div class="ci" onclick="event.stopPropagation();tC('${key}',${ci},${w.ck.length})"><div class="ck ${wck[key][ci]?'on':''}">✓</div><span style="${wck[key][ci]?'text-decoration:line-through;opacity:.4':''}">${c}</span></div>`).join('')}
          </div>
          <button class="wb ${isDone?'yes':''}" onclick="event.stopPropagation();mWD(${mi},${wi})">${isDone?'↩ Chưa xong':'✓ Xong tuần này'}</button>
        </div>
      </div>`;
    });

    mc.innerHTML=`
      <div class="mh">
        <div class="mno">Tháng ${m.n}</div>
        <div class="mt">${m.t}</div>
        <span class="mb ${m.b}">${m.bl}</span>
        <span class="cv ${isOpen?'o':''}">▾</span>
      </div>
      ${anyDone&&!allDone?`<div class="mbar"><div class="mbfil" style="width:${Math.round(doneWk/totalWk*100)}%"></div></div>`:''}
      <div class="mdet ${isOpen?'o':''}">${wHtml}</div>`;
    list.appendChild(mc);
  });
  updateP();
}

function tW(mi,wi){wo[mi]=wo[mi]===wi?null:wi;render()}
function tC(key,ci,len){if(!wck[key])wck[key]=new Array(len).fill(false);wck[key][ci]=!wck[key][ci];sv();render()}
function mWD(mi,wi){const g=wGlobalIdx(mi,wi);wd.has(g)?wd.delete(g):wd.add(g);sv();render()}
function updateP(){
  const total=D.reduce((a,m)=>a+m.weeks.length,0),d=wd.size;
  document.getElementById('pf').style.width=Math.round(d/total*100)+'%';
  document.getElementById('pl').textContent=d+' / '+total+' tuần';
  document.getElementById('dc').textContent=d;
}
render();
</script>
